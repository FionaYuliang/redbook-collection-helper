<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小红书收藏整理助手</title>
    <link rel="stylesheet" href="./sidepanel.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <h1>收藏整理</h1>
          <p id="syncSummary">本地优先，等待导入</p>
        </div>
        <button id="settingsButton" class="icon-button" title="设置" aria-label="设置">⚙</button>
      </header>

      <section class="stats-strip" aria-label="收藏统计">
        <div>
          <span id="totalNotes">0</span>
          <small>总收藏</small>
        </div>
        <div>
          <span id="totalCategories">0</span>
          <small>一级分类</small>
        </div>
        <div>
          <span id="totalTopics">0</span>
          <small>子分类</small>
        </div>
      </section>

      <main>
        <section id="categoriesView" class="view active-view"></section>
        <section id="notesView" class="view"></section>
        <section id="collectionsView" class="view"></section>
        <section id="settingsView" class="view"></section>
      </main>

      <dialog id="noteDialog">
        <form method="dialog" class="dialog-card">
          <button class="dialog-close" value="cancel" title="关闭">×</button>
          <div id="noteDialogContent"></div>
        </form>
      </dialog>

      <section id="busyOverlay" class="busy-overlay" aria-live="polite" aria-busy="true" hidden>
        <div class="busy-panel">
          <div class="busy-spinner" aria-hidden="true"></div>
          <strong id="busyTitle">采集中</strong>
          <p id="busyDetail">正在读取当前页面收藏。</p>
          <small id="busyMeta">请保持小红书标签页打开。</small>
          <button id="stopScanButton" class="button danger busy-stop" data-action="stop-page-scan" hidden>停止采集</button>
        </div>
      </section>

      <div id="toast" class="toast" role="status"></div>
    </div>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
